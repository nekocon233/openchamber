name: upstream sync

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ github.repository == 'nekocon233/openchamber' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout downstream main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: main

      - name: Merge upstream main into rolling sync branch
        id: sync
        env:
          BRANCH: sync/upstream-main
          UPSTREAM_URL: https://github.com/openchamber/openchamber.git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" || true
          git fetch --no-tags "$UPSTREAM_URL" main:refs/remotes/upstream/main

          if git merge-base --is-ancestor refs/remotes/upstream/main refs/remotes/origin/main; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git switch -C "$BRANCH" "refs/remotes/origin/$BRANCH"
            git merge --no-edit refs/remotes/origin/main
          else
            git switch -c "$BRANCH" refs/remotes/origin/main
          fi

          UPSTREAM_SHA=$(git rev-parse refs/remotes/upstream/main)
          git merge --no-ff --no-edit refs/remotes/upstream/main -m "chore: merge upstream main at ${UPSTREAM_SHA:0:12}"
          git push --set-upstream origin "$BRANCH"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

      - name: Create or update draft sync pull request
        if: ${{ steps.sync.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.sync.outputs.branch }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
        run: |
          PR_NUMBER=$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          TITLE="chore: sync upstream main"
          BODY="Automated merge of openchamber/openchamber:main at ${UPSTREAM_SHA}. Review conflicts and downstream regression checks before merging. Do not squash this upstream sync."

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body "$BODY"
          else
            gh pr create --draft --base main --head "$BRANCH" --title "$TITLE" --body "$BODY"
          fi

      - name: Run read-only downstream checks
        if: ${{ steps.sync.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.sync.outputs.branch }}
        run: gh workflow run downstream-checks.yml --ref "$BRANCH"
